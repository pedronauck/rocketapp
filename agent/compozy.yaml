name: pokemon-vision
version: "0.1.0"
description: Image-based Pokémon recognition using a vision tool and agent orchestration

author:
  name: Compozy
  url: https://github.com/pedronauck

workflows:
  - source: ./workflow.yaml

models:
  - provider: groq
    model: openai/gpt-oss-120b
    api_key: "{{ .env.GROQ_API_KEY }}"
    params:
      temperature: 0.3

runtime:
  type: bun
  entrypoint: "./entrypoint.ts"
  permissions:
    - --allow-read
    - --allow-net
    - --allow-write
